name: Update manifest

# Regenerates content/bundle.json (single-file sync payload) + content/manifest.json
# after content lands on main and commits them back, so the app gets a fresh,
# integrity-checked, one-request sync payload automatically.

on:
  push:
    branches: [main]
    paths:
      - 'content/glossary/**'
      - 'content/questions/**'
      - 'content/decks/**'
      - 'content/guides/**'
      - 'content/sequences/**'
      - 'content/cases/**'
      - 'content/pointclick/**'
      - 'content/figuregen/**'

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run manifest
      - name: Commit bundle + manifest if changed
        run: |
          if ! git diff --quiet -- content/manifest.json content/bundle.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add content/manifest.json content/bundle.json
            git commit -m "chore: regenerate content bundle + manifest [skip ci]"
            git push
          else
            echo "bundle + manifest unchanged"
          fi
