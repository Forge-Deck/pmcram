name: Update manifest

# Regenerates content/manifest.json after content lands on main and commits it
# back, so the app gets a fresh, integrity-checked sync index automatically.

on:
  push:
    branches: [main]
    paths:
      - 'content/glossary/**'
      - 'content/questions/**'
      - 'content/decks/**'

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run manifest
      - name: Commit manifest if changed
        run: |
          if ! git diff --quiet -- content/manifest.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add content/manifest.json
            git commit -m "chore: regenerate content manifest [skip ci]"
            git push
          else
            echo "manifest unchanged"
          fi
